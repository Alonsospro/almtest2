<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Inventario</title>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #4f8ef7;
            --accent2: #7c3aed;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #e8eaf6;
            --text-muted: #8b90a7;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 0 24px;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        #readerWrapper {
            display: none;
        }

        #readerWrapper.active {
            display: block;
        }

        #reader {
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--border);
            margin-bottom: 12px;
        }

        #reader button {
            background-color: #374151 !important;
            color: white !important;
            border: none !important;
            padding: 8px 14px !important;
            border-radius: 6px !important;
            margin: 8px auto !important;
            font-family: 'DM Sans', sans-serif !important;
        }

        #scanProgress {
            display: none;
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #scanProgress.active {
            display: block;
        }

        #scanProgressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 99px;
            transition: width 1.5s linear;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-scan {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            margin-bottom: 14px;
        }

        .btn-search {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0 16px;
            width: auto;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: white;
            margin-top: 8px;
            padding: 16px;
            font-size: 16px;
        }

        .btn-reset {
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
            margin-top: 10px;
            font-size: 14px;
        }

        .search-group {
            display: flex;
            gap: 8px;
        }

        .search-group input {
            flex: 1;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-top: 16px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
        }

        textarea {
            resize: none;
        }

        #statusBadge {
            margin: 14px 0 4px;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .badge-info {
            background: rgba(79,142,247,0.12);
            color: var(--accent);
        }

        .badge-new {
            background: rgba(245,158,11,0.12);
            color: var(--warning);
        }

        .badge-exists {
            background: rgba(34,197,94,0.12);
            color: var(--success);
        }

        .badge-info .badge-dot {
            background: var(--accent);
        }

        .badge-new .badge-dot {
            background: var(--warning);
        }

        .badge-exists .badge-dot {
            background: var(--success);
        }

        .cantidad-sistema {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .selector-coincidencias {
            display: none;
            margin-top: 12px;
        }

        .selector-coincidencias.show {
            display: block;
        }

        .radio-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }

        .radio-tile {
            position: relative;
            cursor: pointer;
        }

        .radio-tile input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .radio-tile-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--surface2);
            border: 2px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .radio-tile input:checked + .radio-tile-inner {
            border-color: var(--accent);
            color: var(--accent);
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="header-icon">📦</div>
        <div>
            <h1>Control de Inventario</h1>
            <p>Escanea o busca un producto para registrar</p>
        </div>
    </div>

    <!-- SCANNER -->
    <div class="card">
        <div class="card-title">📷 Escáner QR / Código de barras</div>

        <button class="btn btn-scan" id="btnScan" onclick="toggleScanner()">
            📷 <span id="btnScanText">Abrir Cámara</span>
        </button>

        <div id="readerWrapper">
            <div id="reader"></div>

            <div id="scanProgress">
                <div id="scanProgressBar"></div>
            </div>
        </div>
    </div>

    <!-- BÚSQUEDA -->
    <div class="card">

        <div class="card-title">🔍 Búsqueda manual</div>

        <div class="search-group">
            <input type="text" id="codigo" placeholder="Código o nombre del producto...">
            <button class="btn btn-search" onclick="buscarManual()">Buscar</button>
        </div>

        <div id="wrapperCoincidencias" class="selector-coincidencias">
            <select id="selectCoincidencias" onchange="seleccionarProducto()">
                <option value="">-- Selecciona el producto --</option>
            </select>
        </div>

        <div id="statusBadge"></div>
    </div>

    <!-- FORM -->
    <div class="card" id="formCard" style="display:none;">

        <div class="card-title">📝 Datos del producto</div>

        <label>Nombre del Producto</label>
        <input type="text" id="producto" disabled>

        <label>Ubicación</label>
        <input type="text" id="ubicacion" disabled>

        <hr class="divider">

        <label>Estado</label>

        <div class="radio-container">

            <label class="radio-tile">
                <input type="radio" name="estado" value="En existencia" checked>
                <div class="radio-tile-inner">✅ En existencia</div>
            </label>

            <label class="radio-tile">
                <input type="radio" name="estado" value="Sin existencia">
                <div class="radio-tile-inner">❌ Sin existencia</div>
            </label>

        </div>

        <label>Cantidad</label>
        <input type="number" id="cantidad" min="0">

        <label>Comentario</label>
        <textarea id="comentario" rows="2"></textarea>

        <button class="btn btn-submit" id="submitBtn" onclick="guardar()">
            💾 <span id="submitText">Guardar en Google Sheets</span>
        </button>

        <button class="btn btn-reset" onclick="resetForm()">
            ↩ Nuevo registro
        </button>

    </div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby5dzjEuv7qdioKoESxYS9rL29Z70ByIMfaHUqNfnfsXth4eaRbfABUrAYNHUvQ9MVXVg/exec";

let filaActualizar = null;
let listaResultados = [];
let scanTimer = null;
let ultimoCodigo = "";
let scannerActivo = false;
let html5QrcodeScanner = null;

function toggleScanner() {
    if (scannerActivo) cerrarScanner();
    else abrirScanner();
}

function abrirScanner() {

    document.getElementById('readerWrapper').classList.add('active');
    document.getElementById('btnScanText').textContent = "Cerrar Cámara";

    scannerActivo = true;

    html5QrcodeScanner = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: { width: 250, height: 120 },
        rememberLastUsedCamera: true
    });

    html5QrcodeScanner.render(onScanSuccess);
}

function cerrarScanner() {

    if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(() => {});
        html5QrcodeScanner = null;
    }

    document.getElementById('readerWrapper').classList.remove('active');
    document.getElementById('btnScanText').textContent = "Abrir Cámara";

    scannerActivo = false;
}

function onScanSuccess(decodedText) {

    if (decodedText === ultimoCodigo) return;

    ultimoCodigo = decodedText;

    document.getElementById('codigo').value = decodedText;

    cerrarScanner();

    buscarCodigo(decodedText);
}

function buscarManual() {

    const cod = document.getElementById('codigo').value.trim();

    if (cod) buscarCodigo(cod);
}

function buscarCodigo(texto) {

    const badge = document.getElementById('statusBadge');

    badge.innerHTML =
        '<div class="badge badge-info"><span class="badge-dot"></span>Buscando...</div>';

    fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({
            accion: "buscar",
            codigo: texto
        })
    })

    .then(r => r.json())

    .then(data => {

        if (!data.encontrado) {

            badge.innerHTML =
                '<div class="badge badge-new"><span class="badge-dot"></span>Producto nuevo</div>';

            document.getElementById('producto').value = "";
            document.getElementById('ubicacion').value = "";

            document.getElementById('producto').disabled = false;
            document.getElementById('ubicacion').disabled = false;

            filaActualizar = null;

            document.getElementById('formCard').style.display = "block";

            return;
        }

        listaResultados = data.lista;

        if (data.multiples) {

            let opts = '<option value="">Selecciona...</option>';

            data.lista.forEach((item, i) => {
                opts += `<option value="${i}">${item.producto}</option>`;
            });

            document.getElementById('selectCoincidencias').innerHTML = opts;

            document.getElementById('wrapperCoincidencias').classList.add('show');

        } else {

            cargarProducto(data.lista[0]);
        }
    })

    .catch(() => {

        badge.innerHTML =
            '<div class="badge badge-new"><span class="badge-dot"></span>Error de conexión</div>';
    });
}

function seleccionarProducto() {

    const idx = document.getElementById('selectCoincidencias').value;

    if (idx !== "") cargarProducto(listaResultados[idx]);
}

function cargarProducto(item) {

    document.getElementById('statusBadge').innerHTML = `
        <div class="badge badge-exists">
            <span class="badge-dot"></span>
            Producto encontrado
        </div>
    `;

    document.getElementById('codigo').value = item.codigo;
    document.getElementById('producto').value = item.producto;
    document.getElementById('ubicacion').value = item.ubicacion;

    document.getElementById('producto').disabled = true;
    document.getElementById('ubicacion').disabled = true;

    filaActualizar = item.fila;

    document.getElementById('formCard').style.display = "block";
}

async function guardar() {

    const btn = document.getElementById('submitBtn');
    const txt = document.getElementById('submitText');

    btn.disabled = true;
    txt.textContent = "Guardando...";

    const payload = {

        accion: "registrar",

        filaActualizar: filaActualizar,

        codigo: document.getElementById('codigo').value,

        producto: document.getElementById('producto').value,

        ubicacion: document.getElementById('ubicacion').value,

        estado: document.querySelector('input[name="estado"]:checked').value,

        cantidad: document.getElementById('cantidad').value,

        comentario: document.getElementById('comentario').value
    };

    try {

        const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.resultado === "Éxito") {

            alert("✅ Inventario actualizado correctamente.");

            resetForm();

        } else {

            alert("⚠️ Error");
        }

    } catch (error) {

        alert("❌ No se pudo conectar con Google Sheets.");
    }

    btn.disabled = false;

    txt.textContent = "Guardar en Google Sheets";
}

function resetForm() {

    document.getElementById('codigo').value = "";
    document.getElementById('producto').value = "";
    document.getElementById('ubicacion').value = "";
    document.getElementById('cantidad').value = "";
    document.getElementById('comentario').value = "";

    document.getElementById('statusBadge').innerHTML = "";

    document.getElementById('wrapperCoincidencias').classList.remove('show');

    document.getElementById('formCard').style.display = "none";

    filaActualizar = null;
}

</script>

</body>
</html>
