<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nibol Inventarios - Control de Inventario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-surface: #1e293b;
            --bg-card: #293548;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --success: #34d399;
            --warning: #fbbf24;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container { width: 100%; max-width: 550px; }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.05em; margin-bottom: 0.25rem; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--text-muted); font-size: 0.95rem; }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3), 0 8px 10px -6px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1.25rem; position: relative; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-container { display: flex; gap: 0.5rem; }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
            -webkit-appearance: none;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
        }
        input:disabled, textarea:disabled, select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: rgba(15,23,42,0.3);
            border-color: rgba(51,65,85,0.5);
        }
        input:not(:disabled)[type="text"] {
            border-color: var(--warning);
            background-color: rgba(251,191,36,0.03);
        }
        input:not(:disabled)[type="text"]:focus {
            border-color: var(--warning);
            box-shadow: 0 0 0 3px rgba(251,191,36,0.15);
        }

        /* BOTÓN CÁMARA */
        .btn-scanner {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 0 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .btn-scanner:hover { border-color: var(--accent); color: var(--accent); }
        .btn-scanner.active { background-color: #ef4444; border-color: #ef4444; color: white; }

        /* SCANNER */
        #scanner-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
            background-color: #000;
            display: none;
        }

        /* BARRA DE PROGRESO */
        #scanProgress {
            display: none;
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }
        #scanProgress.active { display: block; }
        #scanProgressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 99px;
            transition: width 1.5s linear;
        }

        .status-badge-container { margin-top: 0.5rem; min-height: 24px; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            animation: fadeIn 0.2s ease-out;
        }
        .badge-info { background: rgba(56,189,248,0.15); color: var(--accent); }
        .badge-success { background: rgba(52,211,153,0.15); color: var(--success); }
        .badge-new {
            background: rgba(251,191,36,0.15);
            color: var(--warning);
            border: 1px solid rgba(251,191,36,0.3);
            animation: pulseGlow 1.5s infinite ease-in-out;
        }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; background-color: currentColor; display: inline-block; }

        /* COINCIDENCIAS */
        .coincidencias-box {
            background-color: rgba(56,189,248,0.08);
            border: 1px dashed var(--accent);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        .coincidencias-box.show { display: block; animation: slideDown 0.3s ease-out; }

        /* RADIO ESTADO */
        .radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .radio-card {
            position: relative;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .radio-card input[type="radio"] { position: absolute; opacity: 0; cursor: pointer; }
        .radio-card span { font-size: 0.95rem; font-weight: 500; color: var(--text-muted); }
        .radio-card:hover { border-color: rgba(255,255,255,0.2); }
        .radio-card.active-bueno { border-color: var(--success); background-color: rgba(52,211,153,0.05); }
        .radio-card.active-bueno span { color: var(--success); font-weight: 600; }
        .radio-card.active-malo { border-color: var(--warning); background-color: rgba(211,84,0,0.05); }
        .radio-card.active-malo span { color: var(--warning); font-weight: 600; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .btn-submit {
            width: 100%;
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .btn-submit:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { opacity: 0.8; } 50% { opacity: 1; background: rgba(251,191,36,0.25); } 100% { opacity: 0.8; } }

        @media (max-width: 480px) {
            .card { padding: 1.25rem; }
            .header h1 { font-size: 1.8rem; }
            .grid-2 { grid-template-columns: 1fr; gap: 0.25rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1><span>Nibol</span> Inventarios</h1>
        <p>Sistema de Toma de Inventarios Físicos</p>
    </div>

    <!-- SCANNER (fuera de la card para ocupar ancho completo) -->
    <div id="scanner-container"></div>
    <div id="scanProgress"><div id="scanProgressBar"></div></div>

    <div class="card">

        <!-- BUSCADOR PRINCIPAL -->
        <div class="form-group">
            <label for="codigo">Código de Barras / Artículo</label>
            <div class="search-container">
                <input type="text" id="codigo" placeholder="Escanee o escriba el código..." autocomplete="off" autofocus>
                <button class="btn-scanner" id="btnToggleCamara" onclick="toggleCamara()" title="Activar cámara">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </button>
            </div>
            <div class="status-badge-container" id="statusBadge"></div>
        </div>

        <!-- MÚLTIPLES COINCIDENCIAS -->
        <div class="coincidencias-box" id="wrapperCoincidencias">
            <label for="selectCoincidencias" style="color: var(--accent);">Variantes específicas encontradas:</label>
            <select id="selectCoincidencias" onchange="seleccionarVariante(this.value)"></select>
        </div>

        <!-- FORMULARIO -->
        <div id="formCard" style="display: none;">
            <div class="form-group">
                <label id="lblProducto" for="producto">Nombre del Producto</label>
                <input type="text" id="producto" placeholder="Descripción del artículo..." disabled>
            </div>

            <div class="form-group">
                <label id="lblUbicacion" for="ubicacion">Ubicación</label>
                <input type="text" id="ubicacion" placeholder="Estante / Pasillo / Góndola..." disabled>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="stockExcel">Cant. en Excel (Sistema)</label>
                    <input type="text" id="stockExcel" style="color: var(--accent); font-weight: 600;" disabled placeholder="-">
                </div>
                <div class="form-group">
                    <label for="cantidad">Cant. Física Hallada</label>
                    <input type="number" id="cantidad" min="0" placeholder="Ej. 1">
                </div>
            </div>

            <div class="form-group">
                <label>Estado del Ítem</label>
                <div class="radio-group">
                    <label class="radio-card active-bueno" id="labelBueno">
                        <input type="radio" name="estado" value="Bueno" checked onclick="cambiarRadioEstilo('Bueno')">
                        <span>Bueno / Disponible</span>
                    </label>
                    <label class="radio-card" id="labelMalo">
                        <input type="radio" name="estado" value="Malo" onclick="cambiarRadioEstilo('Malo')">
                        <span>Malo / Obsoleto</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="comentario">Comentarios / Observaciones</label>
                <textarea id="comentario" rows="2" placeholder="Notas opcionales..."></textarea>
            </div>

            <button class="btn-submit" id="submitBtn" onclick="guardar()">
                <span id="submitText">Guardar en Google Sheets</span>
            </button>
        </div>

    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxubcJLZDt-f2QkLo-0Af-WwLakndYrwBOrt3Z6_NWeHMJJp5eFKuLAb2410n--nMY36A/exec";

    let timeoutBusqueda = null;
    let filaActualizar = null;
    let listaResultadosGlobal = [];
    let html5QrcodeScanner = null;
    let ultimoCodigoLeido = null;
    let timestampPrimerLectura = 0;
    let scannerActivo = false;

    // ── BÚSQUEDA AL ESCRIBIR (retardo 450ms) ─────────────────────────
    document.getElementById('codigo').addEventListener('input', function(e) {
        clearTimeout(timeoutBusqueda);
        ocultarCampos();
        const texto = e.target.value.trim();
        if (texto.length < 2) {
            document.getElementById('statusBadge').innerHTML = '';
            return;
        }
        timeoutBusqueda = setTimeout(() => buscarCodigo(texto), 450);
    });

    // ── CÁMARA ───────────────────────────────────────────────────────
    function toggleCamara() {
        scannerActivo ? apagarCamara() : encenderCamara();
    }

    function encenderCamara() {
        const contenedor = document.getElementById('scanner-container');
        const boton = document.getElementById('btnToggleCamara');

        contenedor.style.display = 'block';
        boton.classList.add('active');
        boton.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';

        ultimoCodigoLeido = null;
        timestampPrimerLectura = 0;
        scannerActivo = true;

        html5QrcodeScanner = new Html5Qrcode("scanner-container");
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            {
                fps: 15,
                qrbox: (w, h) => ({ width: Math.floor(w * 0.85), height: Math.floor(h * 0.45) })
            },
            (decodedText) => {
                const ahora = Date.now();

                // Código nuevo detectado → reiniciar contador y mostrar barra
                if (decodedText !== ultimoCodigoLeido) {
                    ultimoCodigoLeido = decodedText;
                    timestampPrimerLectura = ahora;

                    const progress = document.getElementById('scanProgress');
                    const bar = document.getElementById('scanProgressBar');
                    progress.classList.add('active');
                    bar.style.width = "0%";
                    setTimeout(() => { bar.style.width = "100%"; }, 50);

                    document.getElementById('statusBadge').innerHTML =
                        '<div class="badge badge-info"><span class="badge-dot"></span>Enfocando código... mantenga fijo</div>';
                    return;
                }

                // Mismo código por 1.5s → confirmar
                if (ahora - timestampPrimerLectura >= 1500) {
                    document.getElementById('codigo').value = decodedText;
                    apagarCamara();
                    ocultarCampos();
                    buscarCodigo(decodedText);
                }
            },
            () => {} // errores de frame silenciosos
        ).catch(err => {
            console.error(err);
            alert("Acceso denegado a la cámara.");
            apagarCamara();
        });
    }

    function apagarCamara() {
        const contenedor = document.getElementById('scanner-container');
        const boton = document.getElementById('btnToggleCamara');
        const progress = document.getElementById('scanProgress');

        boton.classList.remove('active');
        boton.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>';
        progress.classList.remove('active');
        scannerActivo = false;

        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop()
                .then(() => { contenedor.style.display = 'none'; html5QrcodeScanner = null; })
                .catch(() => { contenedor.style.display = 'none'; html5QrcodeScanner = null; });
        } else {
            contenedor.style.display = 'none';
        }
    }

    // ── BÚSQUEDA ─────────────────────────────────────────────────────
    function buscarCodigo(texto) {
        const badge = document.getElementById('statusBadge');
        badge.innerHTML = '<div class="badge badge-info"><span class="badge-dot"></span>Buscando en Nibol Inventarios...</div>';

        // ✅ Sin mode/headers — fix CORS
        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ accion: "buscar", codigo: texto })
        })
        .then(res => res.json())
        .then(data => {
            if (!data.encontrado) {
                badge.innerHTML = '<div class="badge badge-new"><span class="badge-dot"></span>¡CÓDIGO NUEVO! REGÍSTRELO ABAJO</div>';
                filaActualizar = null;
                document.getElementById('producto').value = "";
                document.getElementById('ubicacion').value = "";
                document.getElementById('stockExcel').value = "0";
                document.getElementById('producto').disabled = false;
                document.getElementById('ubicacion').disabled = false;
                document.getElementById('lblProducto').innerHTML = 'Nombre del Producto <span style="color:var(--warning); font-size:11px;">(Escriba descripción aquí)</span>';
                document.getElementById('lblUbicacion').innerHTML = 'Ubicación <span style="color:var(--warning); font-size:11px;">(Asigne estante/área)</span>';
                document.getElementById('formCard').style.display = "block";
                document.getElementById('producto').focus();
                return;
            }

            if (data.multiples) {
                // Filtrar solo variantes que contengan el texto buscado en el código
                const variantesFiltradas = data.lista.filter(item =>
                    String(item.codigoCompleto || item.codigo).toLowerCase().includes(texto.toLowerCase()) ||
                    String(item.producto).toLowerCase().includes(texto.toLowerCase())
                );

                // ── Si el filtro deja 0 resultados → tratar como código nuevo ──
                if (variantesFiltradas.length === 0) {
                    badge.innerHTML = '<div class="badge badge-new"><span class="badge-dot"></span>¡CÓDIGO NUEVO! REGÍSTRELO ABAJO</div>';
                    filaActualizar = null;
                    document.getElementById('producto').value = "";
                    document.getElementById('ubicacion').value = "";
                    document.getElementById('stockExcel').value = "0";
                    document.getElementById('producto').disabled = false;
                    document.getElementById('ubicacion').disabled = false;
                    document.getElementById('lblProducto').innerHTML = 'Nombre del Producto <span style="color:var(--warning); font-size:11px;">(Escriba descripción aquí)</span>';
                    document.getElementById('lblUbicacion').innerHTML = 'Ubicación <span style="color:var(--warning); font-size:11px;">(Asigne estante/área)</span>';
                    document.getElementById('formCard').style.display = "block";
                    document.getElementById('producto').focus();
                    return;
                }

                // ── Si hay exactamente 1 variante → cargar directo sin selector ──
                if (variantesFiltradas.length === 1) {
                    badge.innerHTML = '<div class="badge badge-success"><span class="badge-dot"></span>Producto localizado</div>';
                    cargarDatosEnFormulario(variantesFiltradas[0]);
                    return;
                }

                badge.innerHTML = `<div class="badge badge-info"><span class="badge-dot"></span>${variantesFiltradas.length} variante(s) encontrada(s)</div>`;
                listaResultadosGlobal = variantesFiltradas;

                let options = '<option value="">-- Seleccione la variante correcta --</option>';
                variantesFiltradas.forEach((item, index) => {
                    const cod = item.codigoCompleto || item.codigo || "";
                    const cant = item.cantidadExcel !== undefined ? item.cantidadExcel : (item.cantidadSistema !== undefined ? item.cantidadSistema : 0);
                    options += `<option value="${index}">${cod} | ${item.producto} [Cant: ${cant}]</option>`;
                });

                document.getElementById('selectCoincidencias').innerHTML = options;
                document.getElementById('wrapperCoincidencias').classList.add('show');
                document.getElementById('formCard').style.display = "none";
            } else {
                badge.innerHTML = '<div class="badge badge-success"><span class="badge-dot"></span>Producto localizado</div>';
                cargarDatosEnFormulario(data.lista ? data.lista[0] : data);
            }
        })
        .catch(err => {
            console.error(err);
            badge.innerHTML = '<div class="badge badge-new"><span class="badge-dot"></span>Error de red o servidor</div>';
        });
    }

    function seleccionarVariante(index) {
        if (index === "") { ocultarCampos(); return; }
        cargarDatosEnFormulario(listaResultadosGlobal[index]);
    }

    function cargarDatosEnFormulario(item) {
        filaActualizar = item.fila;

        const codigoMostrar = item.codigoCompleto || item.codigo || "";
        if (codigoMostrar) document.getElementById('codigo').value = codigoMostrar;

        document.getElementById('producto').value = item.producto || "Sin descripción";
        document.getElementById('ubicacion').value = item.ubicacion || "No registrada";

        const stock = item.cantidadExcel !== undefined ? item.cantidadExcel
                    : item.cantidadSistema !== undefined ? item.cantidadSistema : "-";
        document.getElementById('stockExcel').value = stock;

        document.getElementById('producto').disabled = true;
        document.getElementById('ubicacion').disabled = true;
        document.getElementById('lblProducto').textContent = 'Nombre del Producto';
        document.getElementById('lblUbicacion').textContent = 'Ubicación';
        document.getElementById('wrapperCoincidencias').classList.remove('show');
        document.getElementById('formCard').style.display = "block";
        document.getElementById('cantidad').focus();
    }

    // ── GUARDAR ──────────────────────────────────────────────────────
    async function guardar() {
        const btn = document.getElementById('submitBtn');
        const txt = document.getElementById('submitText');

        const codigo    = document.getElementById('codigo').value.trim();
        const producto  = document.getElementById('producto').value.trim();
        const ubicacion = document.getElementById('ubicacion').value.trim();
        const estado    = document.querySelector('input[name="estado"]:checked').value;
        const cantidad  = document.getElementById('cantidad').value;
        const comentario = document.getElementById('comentario').value.trim();

        if (!codigo) { alert("El código de barras es necesario para registrar."); return; }
        if (!filaActualizar && !producto) {
            alert("Por favor ingrese el Nombre del Producto para registrar este nuevo ítem.");
            return;
        }

        btn.disabled = true;
        txt.textContent = "Sincronizando datos...";

        const payload = { accion: "registrar", filaActualizar, codigo, producto, ubicacion, estado, cantidad, comentario };

        try {
            // ✅ Sin mode/headers — fix CORS
            const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.resultado === "Éxito") {
                alert("✅ Registrado con éxito en la base de datos.");
                resetTotal();
            } else {
                alert("⚠️ Error: " + (data.error || "No se procesó el registro."));
            }
        } catch (error) {
            console.error(error);
            alert("❌ Error de red. Verifica tu conexión e intenta de nuevo.");
        }

        btn.disabled = false;
        txt.textContent = "Guardar en Google Sheets";
    }

    // ── HELPERS ──────────────────────────────────────────────────────
    function cambiarRadioEstilo(valor) {
        document.getElementById('labelBueno').classList.toggle('active-bueno', valor === 'Bueno');
        document.getElementById('labelMalo').classList.toggle('active-malo', valor === 'Malo');
    }

    function ocultarCampos() {
        document.getElementById('formCard').style.display = "none";
        document.getElementById('wrapperCoincidencias').classList.remove('show');
    }

    function resetTotal() {
        document.getElementById('codigo').value = "";
        document.getElementById('producto').value = "";
        document.getElementById('ubicacion').value = "";
        document.getElementById('stockExcel').value = "-";
        document.getElementById('cantidad').value = "";
        document.getElementById('comentario').value = "";
        document.getElementById('statusBadge').innerHTML = "";
        document.getElementById('producto').disabled = true;
        document.getElementById('ubicacion').disabled = true;
        document.getElementById('lblProducto').textContent = 'Nombre del Producto';
        document.getElementById('lblUbicacion').textContent = 'Ubicación';
        cambiarRadioEstilo('Bueno');
        document.querySelector('input[name="estado"][value="Bueno"]').checked = true;
        ocultarCampos();
